<!DOCTYPE html>
<html>
<head>
    <title>Login - Admin Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #161625; color: white;">
    <div style="background: #252538; padding: 40px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 300px;">
        <h2 style="text-align: center;">ADMIN LOGIN</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p style="color: #ff4d4d; font-size: 14px; text-align: center;">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <p>Username:</p>
            <input type="text" name="username" style="width: 100%; padding: 10px; border-radius: 5px; border: none;" required>
            <p>Password:</p>
            <input type="password" name="password" style="width: 100%; padding: 10px; border-radius: 5px; border: none;" required>
            <br><br>
            <button type="submit" style="width: 100%; padding: 12px; background: #00d2ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">LOGIN</button>
        </form>
    </div>
</body>
</html>
